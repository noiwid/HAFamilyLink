[pytest]
# Pytest configuration for Google Family Link.
asyncio_mode = auto

testpaths = tests

addopts =
    -v
    --strict-config
    --strict-markers
    --tb=short

markers =
    asyncio: mark test as async
    integration: mark test as integration test (requires external API access)
    unit: mark test as unit test (uses mocks)

python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = custom_components.familylink
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
