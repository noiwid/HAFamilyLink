views:
- title: Demo
  path: demo
  icon: mdi:google
  theme: ios-dark-mode-blue-red
  type: sections
  max_columns: 3
  sections:
  - type: grid
    cards:
    - type: custom:vertical-stack-in-card
      cards:
      - type: custom:button-card
        name: Kid's Screen Time
        tap_action:
          action: none
        styles:
          card:
          - height: 40px
          - box-shadow: none
          - border: none
          - padding: 0 0 0 16px
          - margin: 0
          name:
          - font-size: 15px
          - font-weight: bold
          - justify-self: start
      - type: custom:mod-card
        card_mod:
          style: |
            ha-card {
              height: 1px;
              background: rgba(152, 152, 157, 0.3);
              box-shadow: none;
              border: none;
            }
        card:
          type: custom:mushroom-title-card
          title: ''
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            :host { --stack-card-gap: 0 !important; }
            ha-card { padding: 0 !important; background: inherit !important; }
        cards:
        - type: custom:button-card
          entity: sensor.child_total_screen_time
          name: Total time
          icon: mdi:clock-outline
          show_state: true
          state_display: |
            [[[
              const e = states['sensor.child_total_screen_time'];
              return e && e.attributes && e.attributes.formatted_hms
                ? e.attributes.formatted_hms
                : (entity.state + ' min');
            ]]]
          styles:
            card:
            - height: 90px
            - border: none
            - border-right: 1px solid rgba(152,152,157,0.3)
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            icon:
            - width: 32px
            - color: var(--primary-color)
            - z-index: 1
            name:
            - font-size: 13px
            - font-weight: 500
            - opacity: 0.7
            - z-index: 1
            state:
            - font-size: 16px
            - font-weight: bold
            - z-index: 1
        - type: custom:button-card
          entity: sensor.firstname_lastname_installed_apps
          name: Apps
          icon: mdi:apps
          show_state: true
          state_display: |
            [[[
              return entity.state + ' apps';
            ]]]
          tap_action:
            action: none
          styles:
            card:
            - height: 90px
            - border: none
            - border-right: 1px solid rgba(152,152,157,0.3)
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            icon:
            - width: 32px
            - color: var(--primary-color)
            - z-index: 1
            name:
            - font-size: 13px
            - font-weight: 500
            - opacity: 0.7
            - z-index: 1
            state:
            - font-size: 16px
            - font-weight: bold
            - z-index: 1
        - type: custom:button-card
          entity: sensor.firstname_lastname_blocked_apps
          name: Blocked
          icon: mdi:block-helper
          show_state: true
          state_display: |
            [[[
              return entity.state + ' apps';
            ]]]
          tap_action:
            action: none
          card_mod:
            style: |
              :host ha-card { border-right: none !important; }
          styles:
            card:
            - height: 90px
            - border: none
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            icon:
            - width: 32px
            - color: '#F44336'
            - z-index: 1
            name:
            - font-size: 13px
            - font-weight: 500
            - opacity: 0.7
            - z-index: 1
            state:
            - font-size: 16px
            - font-weight: bold
            - z-index: 1
      - type: custom:mod-card
        card_mod:
          style: |
            ha-card {
              height: 1px;
              background: rgba(152, 152, 157, 0.3);
              box-shadow: none;
              border: none;
            }
        card:
          type: custom:mushroom-title-card
          title: ''
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            :host { --stack-card-gap: 0 !important; }
            ha-card { padding: 0 !important; background:inherit !important;}
        cards:
        - type: custom:button-card
          entity: switch.firstname_lastname_daily_limit
          name: Daily Limit
          icon: mdi:timer-sand
          tap_action:
            action: toggle
          hold_action:
            action: more-info
          double_tap_action:
            action: toggle
          custom_fields:
            bg: ''
          styles:
            card:
            - position: relative
            - overflow: hidden
            - height: 70px
            - border: none
            - border-right: 1px solid rgba(152,152,157,0.3)
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            custom_fields:
              bg:
              - position: absolute
              - inset: 0
              - z-index: 0
              - pointer-events: none
              - background: |
                  [[[
                    return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                  ]]]
            icon:
            - width: 28px
            - z-index: 1
            - color: |
                [[[
                  return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                ]]]
            - opacity: |
                [[[
                  return entity.state === 'on' ? '1' : '0.5';
                ]]]
            name:
            - font-size: 13px
            - font-weight: 500
            - z-index: 1
        - type: custom:button-card
          entity: switch.firstname_lastname_bedtime
          name: Bedtime
          icon: mdi:weather-night
          tap_action:
            action: toggle
          hold_action:
            action: more-info
          double_tap_action:
            action: toggle
          custom_fields:
            bg: ''
          styles:
            card:
            - position: relative
            - overflow: hidden
            - height: 70px
            - border: none
            - border-right: 1px solid rgba(152,152,157,0.3)
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            custom_fields:
              bg:
              - position: absolute
              - inset: 0
              - z-index: 0
              - pointer-events: none
              - background: |
                  [[[
                    return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                  ]]]
            icon:
            - width: 28px
            - z-index: 1
            - color: |
                [[[
                  return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                ]]]
            - opacity: |
                [[[
                  return entity.state === 'on' ? '1' : '0.5';
                ]]]
            name:
            - font-size: 13px
            - font-weight: 500
            - z-index: 1
        - type: custom:button-card
          entity: input_boolean.child_school_mode
          triggers_update: input_boolean.child_school_mode
          name: School
          icon: mdi:school
          tap_action:
            action: toggle
          hold_action:
            action: more-info
          double_tap_action:
            action: toggle
          custom_fields:
            bg: ''
          styles:
            card:
            - position: relative
            - overflow: hidden
            - height: 70px
            - border: none
            - border-radius: 0
            - padding: 10px 0
            - background: transparent
            custom_fields:
              bg:
              - position: absolute
              - inset: 0
              - z-index: 0
              - pointer-events: none
              - transition: background 120ms ease
              - background: |
                  [[[
                    if (!entity || entity.state === undefined) return 'transparent';
                    return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                  ]]]
            icon:
            - width: 28px
            - z-index: 1
            - color: |
                [[[
                  if (!entity || entity.state === undefined) return 'var(--primary-text-color)';
                  return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                ]]]
            - opacity: |
                [[[
                  if (!entity || entity.state === undefined) return '0.5';
                  return entity.state === 'on' ? '1' : '0.5';
                ]]]
            name:
            - font-size: 13px
            - font-weight: 500
            - z-index: 1
      - type: custom:mod-card
        card_mod:
