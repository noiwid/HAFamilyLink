                  - type: custom:button-card
                    entity: sensor.firstname_temps_d_ecran_total
                    name: Total time
                    icon: mdi:clock-outline
                    show_state: true
                    state_display: |
                      [[[
                        const e = states['sensor.firstname_temps_d_ecran_total'];
                        return e && e.attributes && e.attributes.formatted_hms
                          ? e.attributes.formatted_hms
                          : (entity.state + ' min');
                      ]]]
