                    styles:
                      icon:
                        - color: |
                            [[[
                              let bonus = parseFloat(states['sensor.galaxy_tab_firstname_active_bonus']?.state) || 0;
                              return bonus > 0 ? '#4CAF50' : '#F44336';
                            ]]]
                variables:
