            }
        card:
          type: custom:mushroom-title-card
          title: ''
    - type: custom:vertical-stack-in-card
      cards:
      - type: custom:button-card
        name: Samsung phone
        entity: switch.child_phone
        triggers_update:
        - sensor.child_phone_daily_limit
        - sensor.child_phone_screen_time_remaining
        - sensor.child_phone_active_bonus
        - sensor.firstname_lastname_daily_screen_time
        - switch.child_phone
        show_state: false
        show_label: false
        show_name: true
        show_entity_picture: false
        show_icon: true
        tap_action:
          action: toggle
        state:
        - value: 'on'
          icon: mdi:cellphone
          styles:
            icon:
            - color: '#4CAF50'
        - value: 'off'
          icon: mdi:cellphone-lock
          styles:
            icon:
            - color: '#F44336'
        variables:
          screen_data: "[[[\n  let used = parseFloat(states['sensor.firstname_lastname_daily_screen_time']?.state) || 0;\n  let limit = parseFloat(states['sensor.child_phone_daily_limit']?.state) || 0;\n  let bonus = parseFloat(states['sensor.child_phone_active_bonus']?.state) || 0;\n  let total = limit + bonus;\n  let overflow = used - total;\n  if (overflow < 0) overflow = 0;\n  \n  let percent = (total > 0) ? Math.round((used / total) * 100) : 0;\n  if (percent > 100) percent = 100;\n\n  return {\n    limit: Math.round(limit),\n    bonus: Math.round(bonus),\n    total: Math.round(total),\n    used: Math.round(used),\n    overflow: Math.round(overflow),\n    percent: percent\n  };\n]]]\n"
        styles:
          grid:
          - grid-template-areas: '"i n stat" "bar bar bar"'
          - grid-template-columns: 40px 1fr auto
          - grid-template-rows: 1fr auto
          - grid-gap: 8px
          card:
          - padding: 12px
          icon:
          - grid-area: i
          - width: 30px
          - justify-self: start
          name:
          - grid-area: n
          - justify-self: start
          - align-self: center
          - font-weight: bold
          - font-size: 14px
          custom_fields:
            stat:
            - grid-area: stat
            - align-self: center
            - justify-self: end
            - font-size: 14px
            - font-weight: 500
            - opacity: 0.8
            bar:
            - grid-area: bar
        custom_fields:
          stat: "[[[\n  let bonus = variables.screen_data.bonus;\n  let limit = variables.screen_data.limit;\n  let total = variables.screen_data.total;\n  let used = variables.screen_data.used;\n  let overflow = variables.screen_data.overflow;\n  \n  let base = `${used}m / ${total}m`;\n  let suffix = '';\n  \n  if (bonus > 0) {\n    suffix = ` <span style=\"color: #4CAF50;\">(+${bonus})</span>`;\n  } else if (overflow > 0) {\n    suffix = ` <span style=\"color: #db4437;\">(+${overflow})</span>`;\n  }\n  \n  return base + suffix;\n]]]\n"
          bar: "[[[\n  let pct = variables.screen_data.percent;\n  let color = \"var(--primary-color)\";\n  if (pct >= 90) color = \"#db4437\";\n  else if (pct >= 75) color = \"#f4b400\";\n  \n  return `\n    <div style=\"background-color: rgba(127,127,127, 0.2); border-radius: 6px; width: 100%; height: 12px; overflow: hidden;\">\n      <div style=\"background-color: ${color}; width: ${pct}%; height: 100%;\"></div>\n    </div>\n  `;\n]]]\n"
      - type: custom:mod-card
        card_mod:
          style: |
            ha-card {
              height: 1px;
              background: rgba(152, 152, 157, 0.3);
              box-shadow: none;
              border: none;
            }
        card:
          type: custom:mushroom-title-card
          title: ''
      - type: custom:bubble-card
        card_type: button
        entity: button.child_phone_reset_bonus
        button_type: button
        icon: mdi:restart
        show_icon: true
        force_icon: true
        show_name: true
        show_last_updated: true
        scrolling_effect: true
        card_layout: large
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.child_phone_reset_bonus
        sub_button:
          main:
          - buttons_layout: inline
            group:
            - entity: button.child_phone_15min
              icon: mdi:fast-forward-15
              show_icon: true
              show_name: false
              show_background: true
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: button.child_phone_15min
            - entity: button.child_phone_30min
              icon: mdi:fast-forward-30
              show_icon: true
              show_name: false
              show_background: true
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: button.child_phone_30min
            - entity: button.child_phone_60min
              icon: mdi:fast-forward-60
              show_icon: true
              show_name: false
              show_background: true
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: button.child_phone_60min
          bottom: []
        name: Reset
        styles: |
          .bubble-sub-button {
            background-color: rgba(255, 255, 255, 0.1) !important;
          }
          .bubble-icon-container {
            background-color: rgba(255, 255, 255, 0.1) !important;
          }
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
          - entity: automation.antibonus
            show_name: true
            name: Antibonus
            show_icon: false
            show_state: false
            tap_action:
              action: toggle
            content_layout: icon-left
            fill_width: true
            hold_action:
              action: more-info
          - entity: automation.child_anti_unlock
            name: Unlock
            show_name: true
            show_icon: false
            tap_action:
              action: toggle
            content_layout: icon-left
            fill_width: true
            hold_action:
              action: more-info
          - entity: automation.child_bedtime_enabler
            name: Bedtime
            force_icon: false
            show_icon: false
            show_name: true
            show_state: false
            scrolling_effect: true
            tap_action:
              action: toggle
            content_layout: icon-left
            fill_width: true
            hold_action:
              action: more-info
          - entity: automation.child_daily_limit_enabler
            name: Daily limit
            show_name: true
            force_icon: false
            show_icon: false
            tap_action:
              action: toggle
            content_layout: icon-left
            fill_width: true
            hold_action:
              action: more-info
        rows: 0.938
        card_layout: normal
        styles: |
          :host {
            --bubble-accent-color: rgba(255, 255, 255, 0.15);
            --primary-text-color: #FFF;
          }
