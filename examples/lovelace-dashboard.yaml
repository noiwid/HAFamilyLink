                      card:
                        - height: 90px
                        - border: none
                        - border-right: 1px solid rgba(152,152,157,0.3)
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      icon:
                        - width: 32px
                        - color: var(--primary-color)
                        - z-index: 1
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - opacity: 0.7
                        - z-index: 1
                      state:
                        - font-size: 16px
                        - font-weight: bold
                        - z-index: 1
                  - type: custom:button-card
                    entity: sensor.firstname_name_installed_apps
                    name: Apps
                    icon: mdi:apps
                    show_state: true
                    state_display: |
                      [[[
                        return entity.state + ' apps';
                      ]]]
                    tap_action:
                      action: none
                    styles:
                      card:
                        - height: 90px
                        - border: none
                        - border-right: 1px solid rgba(152,152,157,0.3)
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      icon:
                        - width: 32px
                        - color: var(--primary-color)
                        - z-index: 1
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - opacity: 0.7
                        - z-index: 1
                      state:
                        - font-size: 16px
                        - font-weight: bold
                        - z-index: 1
                  - type: custom:button-card
                    entity: sensor.firstname_name_blocked_apps
                    name: Blocked
                    icon: mdi:block-helper
                    show_state: true
                    state_display: |
                      [[[
                        return entity.state + ' apps';
                      ]]]
                    tap_action:
                      action: none
                    card_mod:
                      style: |
                        :host ha-card { border-right: none !important; }
                    styles:
                      card:
                        - height: 90px
                        - border: none
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      icon:
                        - width: 32px
                        - color: '#F44336'
                        - z-index: 1
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - opacity: 0.7
                        - z-index: 1
                      state:
                        - font-size: 16px
                        - font-weight: bold
                        - z-index: 1
              - type: custom:mod-card
                card_mod:
                  style: |
                    ha-card {
                      height: 1px;
                      background: rgba(152, 152, 157, 0.3);
                      box-shadow: none;
                      border: none;
                    }
                card:
                  type: custom:mushroom-title-card
                  title: ''
              - type: custom:stack-in-card
                mode: horizontal
                card_mod:
                  style: >
                    :host { --stack-card-gap: 0 !important; }

                    ha-card { padding: 0 !important; background:inherit
                    !important;}
                cards:
                  - type: custom:button-card
                    entity: switch.firstname_name_daily_limit
                    name: Daily Limit
                    icon: mdi:timer-sand
                    tap_action:
                      action: toggle
                    hold_action:
                      action: more-info
                    double_tap_action:
                      action: toggle
                    custom_fields:
                      bg: ''
                    styles:
                      card:
                        - position: relative
                        - overflow: hidden
                        - height: 70px
                        - border: none
                        - border-right: 1px solid rgba(152,152,157,0.3)
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      custom_fields:
                        bg:
                          - position: absolute
                          - inset: 0
                          - z-index: 0
                          - pointer-events: none
                          - background: |
                              [[[
                                return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                              ]]]
                      icon:
                        - width: 28px
                        - z-index: 1
                        - color: |
                            [[[
                              return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                            ]]]
                        - opacity: |
                            [[[
                              return entity.state === 'on' ? '1' : '0.5';
                            ]]]
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - z-index: 1
                  - type: custom:button-card
                    entity: switch.firstname_name_bedtime
                    name: Bedtime
                    icon: mdi:weather-night
                    tap_action:
                      action: toggle
                    hold_action:
                      action: more-info
                    double_tap_action:
                      action: toggle
                    custom_fields:
                      bg: ''
                    styles:
                      card:
                        - position: relative
                        - overflow: hidden
                        - height: 70px
                        - border: none
                        - border-right: 1px solid rgba(152,152,157,0.3)
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      custom_fields:
                        bg:
                          - position: absolute
                          - inset: 0
                          - z-index: 0
                          - pointer-events: none
                          - background: |
                              [[[
                                return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                              ]]]
                      icon:
                        - width: 28px
                        - z-index: 1
                        - color: |
                            [[[
                              return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                            ]]]
                        - opacity: |
                            [[[
                              return entity.state === 'on' ? '1' : '0.5';
                            ]]]
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - z-index: 1
                  - type: custom:button-card
                    entity: input_boolean.firstname_mode_school
                    triggers_update: input_boolean.firstname_mode_school
                    name: School
                    icon: mdi:school
                    tap_action:
                      action: toggle
                    hold_action:
                      action: more-info
                    double_tap_action:
                      action: toggle
                    custom_fields:
                      bg: ''
                    styles:
                      card:
                        - position: relative
                        - overflow: hidden
                        - height: 70px
                        - border: none
                        - border-radius: 0
                        - padding: 10px 0
                        - background: transparent
                      custom_fields:
                        bg:
                          - position: absolute
                          - inset: 0
                          - z-index: 0
                          - pointer-events: none
                          - transition: background 120ms ease
                          - background: |
                              [[[
                                if (!entity || entity.state === undefined) return 'transparent';
                                return entity.state === 'on' ? 'rgb(65,56,62)' : 'transparent';
                              ]]]
                      icon:
                        - width: 28px
                        - z-index: 1
                        - color: |
                            [[[
                              if (!entity || entity.state === undefined) return 'var(--primary-text-color)';
                              return entity.state === 'on' ? '#FF9800' : 'var(--primary-text-color)';
                            ]]]
                        - opacity: |
                            [[[
                              if (!entity || entity.state === undefined) return '0.5';
                              return entity.state === 'on' ? '1' : '0.5';
                            ]]]
                      name:
                        - font-size: 13px
                        - font-weight: 500
                        - z-index: 1
              - type: custom:mod-card
                card_mod:
                  style: |
                    ha-card {
                      height: 1px;
                      background: rgba(152, 152, 157, 0.3);
                      box-shadow: none;
                      border: none;
                    }
                card:
                  type: custom:mushroom-title-card
                  title: ''
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:button-card
                name: Kid's Phone
                entity: switch.sm_s916b
                triggers_update:
                  - sensor.sm_s916b_daily_limit
                  - sensor.sm_s916b_screen_time_remaining
                  - sensor.sm_s916b_active_bonus
                  - sensor.firstname_name_daily_screen_time
                  - switch.sm_s916b
                  - sensor.firstname_name_battery_level
                show_state: false
                show_label: false
                show_name: true
                show_entity_picture: false
                show_icon: true
                tap_action:
                  action: toggle
                state:
                  - value: 'on'
                    icon: mdi:cellphone
                    styles:
                      icon:
                        - color: '#4CAF50'
                  - value: 'off'
                    icon: mdi:cellphone-lock
                    styles:
                      icon:
                        - color: '#F44336'
                variables:
                  screen_data: |
                    [[[
                      let used = parseFloat(states['sensor.firstname_name_daily_screen_time']?.state) || 0;
                      let limit = parseFloat(states['sensor.sm_s916b_daily_limit']?.state) || 0;
                      let bonus = parseFloat(states['sensor.sm_s916b_active_bonus']?.state) || 0;
                      let total = limit + bonus;
                      let overflow = used - total;
                      if (overflow < 0) overflow = 0;
                      
                      let percent = (total > 0) ? Math.round((used / total) * 100) : 0;
                      if (percent > 100) percent = 100;

                      return {
                        limit: Math.round(limit),
                        bonus: Math.round(bonus),
                        total: Math.round(total),
                        used: Math.round(used),
                        overflow: Math.round(overflow),
                        percent: percent
                      };
                    ]]]
                styles:
                  grid:
                    - grid-template-areas: '"i n batt stat" "bar bar bar bar"'
                    - grid-template-columns: 40px auto auto 1fr
                    - grid-template-rows: 1fr auto
                    - grid-gap: 8px
                  card:
                    - padding: 12px
                  icon:
                    - grid-area: i
                    - width: 30px
                    - justify-self: start
                  name:
                    - grid-area: 'n'
                    - justify-self: start
                    - align-self: center
                    - font-weight: bold
                    - font-size: 14px
                  custom_fields:
                    stat:
                      - grid-area: stat
                      - align-self: center
                      - justify-self: end
                      - font-size: 14px
                      - font-weight: 500
                      - opacity: 0.8
                    bar:
                      - grid-area: bar
                    batt:
                      - grid-area: batt
                      - align-self: center
                      - justify-self: start
                      - padding-left: 4px
                      - display: flex
                      - align-items: center
                      - height: 100%
                custom_fields:
                  stat: |
                    [[[
                      let bonus = variables.screen_data.bonus;
                      let limit = variables.screen_data.limit;
                      let total = variables.screen_data.total;
                      let used = variables.screen_data.used;
                      let overflow = variables.screen_data.overflow;
                      
                      let base = `${used}m / ${total}m`;
                      let suffix = '';
                      
                      if (bonus > 0) {
                        suffix = ` <span style="color: #4CAF50;">(+${bonus})</span>`;
                      } else if (overflow > 0) {
                        suffix = ` <span style="color: #db4437;">(+${overflow})</span>`;
                      }
                      
                      return base + suffix;
                    ]]]
                  bar: |
                    [[[
                      let pct = variables.screen_data.percent;
                      let color = "var(--primary-color)";
                      if (pct >= 90) color = "#db4437";
                      else if (pct >= 75) color = "#f4b400";
                      
                      return `
                        <div style="background-color: rgba(127,127,127, 0.2); border-radius: 6px; width: 100%; height: 12px; overflow: hidden;">
                          <div style="background-color: ${color}; width: ${pct}%; height: 100%;"></div>
                        </div>
                      `;
                    ]]]
                  batt: |
                    [[[
                      const lvl = parseInt(states['sensor.firstname_name_battery_level']?.state);
                      if (isNaN(lvl)) return '';
                      let color = lvl <= 20 ? '#F44336' : (lvl <= 40 ? '#F4B400' : 'rgba(255,255,255,0.55)');
                      let icon = 'mdi:battery';
                      if (lvl <= 10) icon='mdi:battery-10'; else if (lvl<=20) icon='mdi:battery-20';
                      else if (lvl<=30) icon='mdi:battery-30'; else if (lvl<=40) icon='mdi:battery-40';
                      else if (lvl<=50) icon='mdi:battery-50'; else if (lvl<=60) icon='mdi:battery-60';
                      else if (lvl<=70) icon='mdi:battery-70'; else if (lvl<=80) icon='mdi:battery-80';
                      else if (lvl<=90) icon='mdi:battery-90'; else icon='mdi:battery';
                      return `<span style="display:inline-flex;align-items:center;gap:3px;color:${color};font-size:12px;font-weight:600;line-height:14px;white-space:nowrap;"><ha-icon icon="${icon}" style="--mdc-icon-size:14px;width:14px;height:14px;color:${color};"></ha-icon>${lvl}%</span>`;
                    ]]]
              - type: custom:mod-card
                card_mod:
                  style: |
                    ha-card {
                      height: 1px;
                      background: rgba(152, 152, 157, 0.3);
                      box-shadow: none;
                      border: none;
                    }
                card:
                  type: custom:mushroom-title-card
                  title: ''
              - type: custom:bubble-card
                card_type: button
                entity: button.sm_s916b_reset_bonus
                button_type: button
                icon: mdi:restart
                show_icon: true
                force_icon: true
                show_name: true
                show_last_updated: true
                scrolling_effect: true
                card_layout: large
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.sm_s916b_reset_bonus
                sub_button:
                  main:
                    - buttons_layout: inline
                      group:
                        - entity: button.sm_s916b_15min
                          icon: mdi:fast-forward-15
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.sm_s916b_15min
                        - entity: button.sm_s916b_30min
                          icon: mdi:fast-forward-30
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.sm_s916b_30min
                        - entity: button.sm_s916b_60min
                          icon: mdi:fast-forward-60
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.sm_s916b_60min
                  bottom: []
                name: Reset
                styles: |
                  .bubble-sub-button {
                    background-color: rgba(255, 255, 255, 0.1) !important;
                  }
                  .bubble-icon-container {
                    background-color: rgba(255, 255, 255, 0.1) !important;
                  }
              - type: custom:bubble-card
                card_type: sub-buttons
                sub_button:
                  main: []
                  bottom:
                    - entity: automation.antibonus
                      show_name: true
                      name: Antibonus
                      show_icon: false
                      show_state: false
                      tap_action:
                        action: toggle
                      content_layout: icon-left
                      fill_width: true
                      hold_action:
                        action: more-info
                    - entity: automation.firstname_antideverrouillage
                      name: Unlock
                      show_name: true
                      show_icon: false
                      tap_action:
                        action: toggle
                      content_layout: icon-left
                      fill_width: true
                      hold_action:
                        action: more-info
                    - entity: automation.firstname_bedtime_enabler
                      name: Bedtime
                      force_icon: false
                      show_icon: false
                      show_name: true
                      show_state: false
                      scrolling_effect: true
                      tap_action:
                        action: toggle
                      content_layout: icon-left
                      fill_width: true
                      hold_action:
                        action: more-info
                    - entity: automation.firstname_daily_limit_enabler
                      name: Daily limit
                      show_name: true
                      force_icon: false
                      show_icon: false
                      tap_action:
                        action: toggle
                      content_layout: icon-left
                      fill_width: true
                      hold_action:
                        action: more-info
                rows: 0.938
                card_layout: normal
                styles: |
                  :host {
                    --bubble-accent-color: rgba(255, 255, 255, 0.15);
                    --primary-text-color: #FFF;
                  }
