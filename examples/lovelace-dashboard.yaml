                      let total = variables.screen_data.total;
                      let used = variables.screen_data.used;
                      let overflow = variables.screen_data.overflow;
                      
                      let base = `${used}m / ${total}m`;
                      let suffix = '';
                      
                      if (bonus > 0) {
                        suffix = ` <span style="color: #4CAF50;">(+${bonus})</span>`;
                      } else if (overflow > 0) {
                        suffix = ` <span style="color: #F44336;">(+${overflow})</span>`;
                      }
                      
                      return base + suffix;
                    ]]]
                  bar: |
                    [[[
                      let pct = variables.screen_data.percent;
                      let color = "var(--primary-color)";
                      if (pct >= 90) color = "#db4437";
                      else if (pct >= 75) color = "#f4b400";
                      
                      return `
                        <div style="background-color: rgba(127,127,127, 0.2); border-radius: 6px; width: 100%; height: 12px; overflow: hidden;">
                          <div style="background-color: ${color}; width: ${pct}%; height: 100%;"></div>
                        </div>
                      `;
                    ]]]
              - type: custom:mod-card
                card_mod:
                  style: |
                    ha-card {
                      height: 1px;
                      background: rgba(152, 152, 157, 0.3);
                      box-shadow: none;
                      border: none;
                    }
                card:
                  type: custom:mushroom-title-card
                  title: ''
              - type: custom:bubble-card
                card_type: button
                entity: button.galaxy_tab_firstname_reset_bonus
                button_type: button
                icon: mdi:restart
                show_icon: true
                force_icon: true
                show_name: true
                show_last_updated: true
                scrolling_effect: true
                card_layout: large
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.galaxy_tab_firstname_reset_bonus
                sub_button:
                  main:
                    - buttons_layout: inline
                      group:
                        - entity: button.galaxy_tab_firstname_15min
                          icon: mdi:fast-forward-15
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.galaxy_tab_firstname_15min
                        - entity: button.galaxy_tab_firstname_30min
                          icon: mdi:fast-forward-30
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.galaxy_tab_firstname_30min
                        - entity: button.galaxy_tab_firstname_60min
                          icon: mdi:fast-forward-60
                          show_icon: true
                          show_name: false
                          show_background: true
                          tap_action:
                            action: call-service
                            service: button.press
                            target:
                              entity_id: button.galaxy_tab_firstname_60min
                name: Reset
                styles: |
