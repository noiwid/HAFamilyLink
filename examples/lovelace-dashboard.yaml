title: Family Link Demo
views:
  - title: Parental Control
    icon: mdi:shield-family
    path: controle
    cards:
      - type: vertical-stack
        cards:
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:button-card
                name: Kid's screen time
                tap_action:
                  action: none
                styles:
                  card:
                    - height: 40px
                    - box-shadow: none
                    - border: none
                    - padding: 0 0 0 16px
                    - margin: 0
                  name:
                    - font-size: 15px
                    - font-weight: bold
                    - justify-self: start
              - type: custom:mod-card
                card_mod:
                  style: |
                    ha-card {
                      height: 1px;
                      background: rgba(152, 152, 157, 0.3);
                      box-shadow: none;
                      border: none;
                    }
                card:
                  type: custom:mushroom-title-card
                  title: ''
              - type: custom:stack-in-card
                mode: horizontal
                card_mod:
                  style: >
                    :host { --stack-card-gap: 0 !important; }

                    ha-card { padding: 0 !important; background: inherit
                    !important; }
