version: '3.8'

services:
  familylink-auth:
    # Option 1: Use pre-built standalone image (recommended after v0.9.2)
    image: ghcr.io/noiwid/familylink-auth:standalone
    # Option 2: Build locally from Dockerfile.standalone
    # build:
    #   context: .
    #   dockerfile: Dockerfile.standalone
    container_name: familylink-auth
    ports:
      - "8098:8098"  # Web interface
      - "6079:6079"  # noVNC web interface
    volumes:
      - ./data:/share/familylink2:rw
    # Increase shared memory size for Chromium (default 64MB is too small)
    shm_size: '2gb'
    environment:
      - LOG_LEVEL=info
      - AUTH_TIMEOUT=300
      - SESSION_DURATION=86400
      - VNC_PASSWORD=familylink
      - LANGUAGE=en-US
      - TIMEZONE=Europe/Paris
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8098/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
